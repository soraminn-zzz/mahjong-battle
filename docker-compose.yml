services:
  # PostgreSQLの設定
  postgres:
    image: postgres:15-alpine
    container_name: mahjong_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mahjong_db
      TZ: Asia/Tokyo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # Redisの設定
  redis:
    image: redis:7-alpine
    container_name: mahjong_redis
    ports:
      - "6379:6379"  # ここが重要！
    volumes:
      - redis-data:/data

# データ永続化用のボリューム定義（ここが抜けていました！）
volumes:
  postgres-data:
  redis-data: